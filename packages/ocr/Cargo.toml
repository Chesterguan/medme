[package]
name = "ocr"
version = "0.1.0"
edition = "2021"

[dependencies]
# `download-binaries` + `simd` are oar-ocr's own defaults (we spell them out so
# `default-features = false` here doesn't drop them). `download-binaries` is what
# makes `ort`/ONNX Runtime a *static, self-contained* native lib fetched at BUILD
# time (per target) and linked into the final binary -- no runtime download of the
# runtime. `auto-download` (fetching the OCR *model* files into ~/.oar at run time)
# is split into its own feature below so a packaged/offline build can supply the
# models itself. iOS (production) and Android (`feat/android-pp-ocr`, this
# branch) both build this crate with `engine` -- see the note below.
oar-ocr = { version = "0.8.0", default-features = false, features = [
    "download-binaries",
    "simd",
], optional = true }
image = "0.25"
imageproc = "0.27"
anyhow.workspace = true
lopdf.workspace = true

[dev-dependencies]

[features]
# `engine` pulls in `oar-ocr` (PP-OCRv5 via ONNX Runtime / `ort`), which
# statically bundles the ONNX Runtime library -- hundreds of MB unstripped,
# still tens of MB stripped. On by default so desktop/CLI and this crate's own
# preprocess tests keep full local-OCR support unchanged. Two orthogonal knobs:
#
#   * `engine`        -- links oar-ocr + ONNX Runtime (the actual recognizer).
#                        `ort`'s prebuilt runtime is fetched *at build time* per
#                        target (incl. aarch64-linux-android) and linked
#                        statically -- no runtime download of the runtime.
#   * `auto-download` -- fetches the PP-OCRv5 *model* files into $OAR_HOME
#                        (~/.oar) the first time OCR runs. Needs a writable home.
#
# **This crate's `default-features = false, features = ["engine"]` build does
# now reach mobile**, contrary to the paragraph this replaces (stale as of
# iOS's PP-OCRv5 merge to main -- ADR 0006). Current state: iOS is production
# PP-OCRv5 via this crate (`apps/mobile_flutter/rust/Cargo.toml`'s
# `cfg(target_os = "ios")` dependency edge, `api::vault`'s PP-OCR section).
# Android is `feat/android-pp-ocr` (exploratory, ADR 0005 not yet
# superseded for Android) -- same mechanism, `cfg(any(target_os = "ios",
# target_os = "android"))`; ML Kit stays as the Dart-layer fallback (see
# `ocr_bridge.dart`), not deleted. `pipeline` itself still takes us with
# `default-features = false` (see `packages/pipeline/Cargo.toml`); it's the
# Flutter app's own Rust crate that re-enables `engine` via Cargo feature
# unification, same trick both platforms use. The old `set_model_dir`
# APK-bundling story belonged to the deleted Tauri mobile app (#113) and is
# dead as *that* story -- but `set_model_dir` itself is now exactly what the
# iOS/Android PP-OCR path calls to point at the sandboxed model dir; see
# `api::vault::ensure_pp_models_ready`.
#
# Without `engine`, `recognize`/`recognize_pdf` still compile and return an
# error ("OCR not available"); callers already treat OCR failure as non-fatal
# (pipeline falls back to the near-empty text layer / stores the file with no
# extracted text).
default = ["engine", "auto-download"]
engine = ["dep:oar-ocr"]
auto-download = ["oar-ocr?/auto-download"]

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6.4"
objc2-foundation = "0.3.2"
objc2-vision = "0.3.2"

[target.'cfg(target_os = "windows")'.dependencies]
pollster = "1.0.1"
windows = { version = "0.62.2", features = ["Media_Ocr", "Graphics_Imaging", "Storage_Streams", "Foundation", "Globalization", "Foundation_Collections"] }
