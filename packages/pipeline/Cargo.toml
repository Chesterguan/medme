[package]
name = "pipeline"
version = "0.1.0"
edition = "2021"

[dependencies]
core-model = { path = "../core-model" }
parser = { path = "../parser" }
# Leave the `engine` (oar-ocr/ONNX Runtime) feature off by default here;
# consumers that need real local OCR (desktop, CLI, iOS, and now Android --
# feat/android-pp-ocr) re-enable it via their own direct `ocr` dep (Cargo
# feature unification). oar-ocr/ort *does* cross-compile and link for
# aarch64-linux-android (`ort-sys` fetches a prebuilt static onnxruntime for
# that target, same as it does for iOS) -- verified by a standalone
# `cargo build --target aarch64-linux-android` of the `ocr` crate with
# `engine` before wiring this up; see `apps/mobile_flutter/rust/Cargo.toml`
# for the actual per-platform dependency edge.
ocr = { path = "../ocr", default-features = false }
# No DICOM pixel decoding here — pipeline only calls `dicom::parse_meta`
# (pure Rust). Leave the C/C++ `codecs` feature off; consumers that render
# (desktop) re-enable it via their own direct `dicom` dep (feature unification).
dicom = { path = "../dicom", default-features = false }
anyhow.workspace = true
chrono.workspace = true

[dev-dependencies]
tempfile.workspace = true
