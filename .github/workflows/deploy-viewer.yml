# 把仓库里的托管查看器(web/hosted-viewer/index.html)自动部署到 GitHub Pages
# 服务的 gh-pages 分支 `viewer/index.html`。此前部署是手工的,导致线上比仓库落后
# 多个 commit(缺 CSP/XSS 加固、还留着旧的「已过期」硬拦截)—— #54。此 workflow
# 消除漂移:凡改动 web/hosted-viewer 或本文件并合入 main,即重新部署。
name: Deploy hosted viewer

on:
  push:
    branches: [main]
    paths:
      - "web/hosted-viewer/**"
      - "packages/share/examples/gen_demo_share.rs"
      - "apps/desktop/src-tauri/demo-data/**"
      - ".github/workflows/deploy-viewer.yml"
  workflow_dispatch:

# 最小权限:顶层只读,写权限只给需要推 gh-pages 的那个 job。
permissions:
  contents: read

concurrency:
  group: deploy-viewer
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 推查看器与示例页到 gh-pages 分支
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Build demo share from the real sample dataset
        run: |
          set -euo pipefail
          # 示例页 = 一份**真实加密分享**(同一条生产代码路径),数据换成公开演示数据集。
          cargo run --release -p medme-share --example gen_demo_share -- \
            "$RUNNER_TEMP/demo.html" "$RUNNER_TEMP/demo-pass.txt"
          ls -lh "$RUNNER_TEMP/demo.html"

      - name: Sync web/hosted-viewer -> gh-pages /viewer/
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add -B gh-pages gh-pages-wt origin/gh-pages
          install -D web/hosted-viewer/index.html gh-pages-wt/viewer/index.html
          # 示例页:上一步产出的真实分享(43MB,不入库)。口令随 URL fragment 送达,
          # 故把落地页的样例入口重写成 demo/#<口令> —— 每次部署口令都会变。
          install -D "$RUNNER_TEMP/demo.html" gh-pages-wt/demo/index.html
          PW=$(tr -d '\n' < "$RUNNER_TEMP/demo-pass.txt" | sed 's/ /%20/g')
          sed -i -E "s@href=\"(demo/[^\"]*|viewer/\\?demo)\"@href=\"demo/#${PW}\"@g" \
            gh-pages-wt/index.html
          grep -c 'href="demo/#' gh-pages-wt/index.html || echo "warn: 落地页未找到样例入口"
          cd gh-pages-wt
          git add viewer/index.html demo/index.html index.html
          if git diff --cached --quiet; then
            echo "viewer already up to date; nothing to deploy"
          else
            git commit -m "deploy: sync hosted viewer from ${GITHUB_SHA::7}"
            git push origin gh-pages
          fi
